    <h2>Contact Me</h2>
    <p>Feel free to reach out using the form below, or via the contact details on my résumé page.</p>

    <!-- Placeholder for now, does not function -->
    <form action="#" method="post">
      <fieldset>
        <legend>Send a Message</legend>

        <p>
          <label for="contact-name">Name:</label>
          <input type="text" id="contact-name" name="contact-name" placeholder="Your full name" required>
        </p>

        <p>
          <label for="contact-email">Email:</label>
          <input type="email" id="contact-email" name="contact-email" placeholder="you@example.com" required>
        </p>

        <p>
          <label for="contact-subject">Subject:</label>
          <input type="text" id="contact-subject" name="contact-subject" placeholder="What's this about?">

        <p>
          <label for="contact-message">Message:</label>
          <textarea id="contact-message" name="contact-message" rows="6" placeholder="Write your message here..."></textarea>
        </p>

        <button type="submit">Send Message</button>
      </fieldset>
    </form>
